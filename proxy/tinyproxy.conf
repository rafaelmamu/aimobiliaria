# Minimal tinyproxy config for forwarding CRM49 calls from a BR VPS.
# Change BasicAuth credentials before going live.

User nobody
Group nogroup
Port 8888
Listen 0.0.0.0
Timeout 600
DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatFile "/usr/share/tinyproxy/stats.html"
LogLevel Info
PidFile "/var/run/tinyproxy/tinyproxy.pid"
MaxClients 50

# Restrict access to authenticated callers only.
# Replace the password before deploying.
BasicAuth crm49 CHANGE-ME-strong-password

# Allow CONNECT for HTTPS to the CRM49 port.
ConnectPort 443

# Optional tight allowlist — only lets the proxy forward to the CRM49 host.
# Uncomment to enable:
# Filter "/etc/tinyproxy/filter.txt"
# FilterDefaultDeny Yes
